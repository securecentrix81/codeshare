<!-- Codeshare v2 (aka. very fun XSS attack script for free hosted on a public repository) -->
<!DOCTYPE html>
<html>
<head>
    <title>Codeshare</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        textarea { width: 100%; height: 200px; }
        #overlay {
            width:100%; height:100%; position:fixed; top:0; left:0; 
            background:#fff; display:flex; justify-content:center; 
            align-items:center; font-size:5vmin; z-index: 100;
        }
    </style>
</head>
<body>
    <textarea id="textareaInput" placeholder="Paste code here..."></textarea>
    <button id="compressBtn">Compress & Generate Link</button>
    <div id="overlay">Loading...</div>

    <script>
        // Helper to convert Uint8Array to Base64
        const bufferToBase64 = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
        // Helper to convert Base64 back to Uint8Array
        const base64ToBuffer = (str) => Uint8Array.from(atob(str), c => c.charCodeAt(0));

        async function compressText(input) {
            const encoder = new TextEncoder();
            const data = encoder.encode(input);
            const stream = new ReadableStream({
                start(c) { c.enqueue(data); c.close(); }
            }).pipeThrough(new CompressionStream('gzip'));
            const compressed = await new Response(stream).arrayBuffer();
            return bufferToBase64(compressed);
        }

        async function decompressText(base64) {
            const data = base64ToBuffer(base64);
            const stream = new ReadableStream({
                start(c) { c.enqueue(data); c.close(); }
            }).pipeThrough(new DecompressionStream('gzip'));
            return await new Response(stream).text();
        }

        (async function init() {
            const params = new URLSearchParams(window.location.search);
            const hashData = window.location.hash.slice(1);
            const data = hashData || params.get("data");

            if (data) {
                try {
                    const decompressed = await decompressText(decodeURIComponent(data));
                    if (params.get("analyze")) {
                        document.body.innerHTML = `<pre></pre>`;
                        document.querySelector("pre").textContent = decompressed;
                    } else {
                        document.open();
                        document.write(decompressed);
                        document.close();
                    }
                } catch (e) {
                    alert("Decompression failed: " + e.message);
                    document.getElementById("overlay").remove();
                }
            } else {
                document.getElementById("overlay").remove();
                document.getElementById("compressBtn").onclick = async () => {
                    const input = document.getElementById("textareaInput").value;
                    if (!input) return alert("Nothing to compress");
                    const compressed = await compressText(input);
                    // Update URL without a full page reload to avoid redirect loops
                    window.location.hash = encodeURIComponent(compressed);
                    window.location.reload(); 
                };
            }
        })();
    </script>
</body>
</html>
